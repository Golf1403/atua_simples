name: Node.js in Alpine

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: node:20-alpine

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies and build
        run: |
          yarn install

      - name: Run eslint
        run: |
          yarn lint

      - name: Run tests
        run: |
          yarn test
